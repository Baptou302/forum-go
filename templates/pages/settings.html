{{define "content"}}
<div class="mx-auto max-w-2xl">
    <h1 class="font-display text-3xl font-extrabold text-slate-900 dark:text-white">Paramètres</h1>
    <p class="mt-1 text-slate-500 dark:text-slate-400">Gérez les informations de votre profil public.</p>

    <div class="mt-6 rounded-2xl border border-slate-200 bg-white p-6 shadow-card dark:border-slate-800 dark:bg-slate-900 sm:p-8">
        <div class="flex items-center gap-4 border-b border-slate-100 pb-6 dark:border-slate-800">
            {{template "avatar" dict "User" .User "Class" "h-16 w-16 text-2xl"}}
            <div>
                <p class="text-lg font-bold text-slate-900 dark:text-white">{{.User.Username}}</p>
                <p class="text-sm text-slate-400">{{.User.Email}}</p>
                <span class="mt-1 inline-block rounded px-2 py-0.5 text-xs font-bold {{roleBadge .User.Role}}">{{roleLabel .User.Role}}</span>
            </div>
        </div>

        <form action="/parametres" method="post" class="mt-6 space-y-5">
            <div>
                <label class="mb-1.5 block text-sm font-semibold text-slate-700 dark:text-slate-300">Biographie</label>
                <textarea name="bio" rows="4" maxlength="280" placeholder="Parlez un peu de vous, de votre collection, de vos jeux préférés…"
                    class="w-full resize-y rounded-xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm outline-none transition focus:border-brand-400 focus:bg-white focus:ring-2 focus:ring-brand-100 dark:border-slate-700 dark:bg-slate-800 dark:text-slate-100">{{.User.Bio}}</textarea>
                <p class="mt-1 text-xs text-slate-400">280 caractères maximum.</p>
            </div>
            <div class="flex justify-end gap-3 border-t border-slate-100 pt-5 dark:border-slate-800">
                <a href="/u/{{.User.Username}}" class="rounded-xl px-4 py-2.5 text-sm font-semibold text-slate-500 hover:text-slate-700 dark:hover:text-slate-300">Annuler</a>
                <button class="inline-flex items-center gap-2 rounded-xl bg-brand-600 px-5 py-2.5 text-sm font-bold text-white shadow-soft transition hover:bg-brand-700"><i data-lucide="save" class="h-4 w-4"></i> Enregistrer</button>
            </div>
        </form>
    </div>
</div>
{{end}}
