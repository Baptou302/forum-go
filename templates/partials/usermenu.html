{{define "usermenu"}}
<div x-data="{ menu:false }" class="relative ml-1">
    <button @click="menu=!menu" class="flex items-center gap-1 rounded-full p-0.5 transition hover:ring-2 hover:ring-brand-200 dark:hover:ring-brand-800">
        {{template "avatar" dict "User" . "Class" "h-9 w-9 text-sm"}}
    </button>
    <div x-show="menu" @click.outside="menu=false" x-transition x-cloak
         class="absolute right-0 mt-2 w-52 overflow-hidden rounded-xl border border-slate-200 bg-white py-1.5 shadow-card dark:border-slate-700 dark:bg-slate-800">
        <div class="border-b border-slate-100 px-4 py-2.5 dark:border-slate-700">
            <p class="truncate text-sm font-bold text-slate-900 dark:text-white">{{.Username}}</p>
            <p class="text-xs text-slate-400">{{roleLabel .Role}}</p>
        </div>
        <a href="/u/{{.Username}}" class="flex items-center gap-2.5 px-4 py-2 text-sm text-slate-600 hover:bg-slate-50 dark:text-slate-300 dark:hover:bg-slate-700/50"><i data-lucide="user" class="h-4 w-4"></i> Mon profil</a>
        <a href="/parametres" class="flex items-center gap-2.5 px-4 py-2 text-sm text-slate-600 hover:bg-slate-50 dark:text-slate-300 dark:hover:bg-slate-700/50"><i data-lucide="settings" class="h-4 w-4"></i> Paramètres</a>
        <form action="/logout" method="post" class="border-t border-slate-100 dark:border-slate-700">
            <button type="submit" class="flex w-full items-center gap-2.5 px-4 py-2 text-sm text-red-600 hover:bg-red-50 dark:hover:bg-red-500/10"><i data-lucide="log-out" class="h-4 w-4"></i> Déconnexion</button>
        </form>
    </div>
</div>
{{end}}
