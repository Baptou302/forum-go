{{define "category_card"}}
<a href="/categorie/{{.Slug}}" class="group relative flex flex-col rounded-2xl border border-slate-200 bg-white p-5 transition hover:-translate-y-0.5 hover:border-brand-300 hover:shadow-card dark:border-slate-800 dark:bg-slate-900 dark:hover:border-brand-700">
    <div class="flex items-start gap-4">
        <span class="grid h-12 w-12 shrink-0 place-items-center rounded-xl" style="background-color:{{.Color}}1a;color:{{.Color}}">
            <i data-lucide="{{.Icon}}" class="h-6 w-6"></i>
        </span>
        <div class="min-w-0">
            <h3 class="font-bold text-slate-900 transition group-hover:text-brand-600 dark:text-white dark:group-hover:text-brand-400">{{.Name}}</h3>
            <p class="mt-1 line-clamp-2 text-sm text-slate-500 dark:text-slate-400">{{.Description}}</p>
        </div>
    </div>
    <div class="mt-4 flex items-center gap-4 border-t border-slate-100 pt-3 text-xs font-medium text-slate-400 dark:border-slate-800">
        <span class="inline-flex items-center gap-1.5"><i data-lucide="message-square" class="h-3.5 w-3.5"></i>{{.ThreadCount}} {{plural .ThreadCount "sujet" "sujets"}}</span>
        <span class="inline-flex items-center gap-1.5"><i data-lucide="messages-square" class="h-3.5 w-3.5"></i>{{.PostCount}} {{plural .PostCount "message" "messages"}}</span>
        {{if .LastThread}}<span class="ml-auto hidden truncate sm:block">{{timeAgo .LastActivityAt}}</span>{{end}}
    </div>
</a>
{{end}}
