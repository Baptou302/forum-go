{{define "header"}}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4 Couleurs — Forum</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<header class="site-header">
    <div class="container nav-bar">
        <div class="logo-block">
            <a href="/" class="logo">
                <span class="dot rouge">&#9679;</span>
                <span class="dot bleu">&#9679;</span>
                <span class="dot vert">&#9679;</span>
                <span class="dot noir">&#9679;</span>
                4 Couleurs
            </a>
            <span class="logo-sub">Le forum du jeu de cartes</span>
        </div>
        <nav>
            {{if .User}}
                <span class="nav-user">@{{.User.Username}}</span>
                <a href="/?new=1" class="btn btn-accent">+ Nouveau post</a>
                <form action="/logout" method="post" style="display:inline">
                    <button type="submit" class="btn btn-ghost">Déconnexion</button>
                </form>
            {{else}}
                <a href="/login" class="btn btn-ghost">Connexion</a>
                <a href="/register" class="btn btn-accent">S'inscrire</a>
            {{end}}
        </nav>
    </div>
</header>
<main class="container">
{{end}}

{{define "footer"}}
</main>
<footer class="site-footer">
    <div class="container">
        <p>
            <span class="dot rouge">&#9679;</span>
            <span class="dot bleu">&#9679;</span>
            <span class="dot vert">&#9679;</span>
            <span class="dot noir">&#9679;</span>
            4 Couleurs Forum &mdash; Go + SQLite
        </p>
    </div>
</footer>
</body>
</html>
{{end}}
