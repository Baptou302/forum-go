{{define "auth.html"}}
{{template "header" .}}

<div class="auth-wrap">
    <div class="card auth-card">
        <div class="auth-tabs">
            <a href="/login" class="auth-tab{{if eq .Tab "login"}} active{{end}}">Login</a>
            <a href="/register" class="auth-tab{{if eq .Tab "register"}} active{{end}}">Register</a>
        </div>

        {{if .Error}}<div class="alert">{{.Error}}</div>{{end}}

        {{if eq .Tab "login"}}
        <form action="/login" method="post" class="auth-form">
            <div class="form-group">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="input" required autofocus>
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="input" required>
            </div>
            <button type="submit" class="btn btn-accent btn-full">Login</button>
            <p class="auth-switch">No account? <a href="/register" class="link">Register</a></p>
        </form>
        {{else}}
        <form action="/register" method="post" class="auth-form">
            <div class="form-group">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="input" required autofocus>
            </div>
            <div class="form-group">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="input" required>
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="input" required>
            </div>
            <button type="submit" class="btn btn-accent btn-full">Create account</button>
            <p class="auth-switch">Already a member? <a href="/login" class="link">Login</a></p>
        </form>
        {{end}}
    </div>
</div>

{{template "footer" .}}
{{end}}
