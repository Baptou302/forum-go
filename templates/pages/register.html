{{define "content"}}
<div class="mx-auto flex max-w-md flex-col items-center py-6">
    <a href="/" class="mb-6 grid h-14 w-14 place-items-center rounded-2xl bg-gradient-to-br from-brand-500 to-violet-600 text-2xl text-white shadow-soft">♠</a>
    <h1 class="font-display text-3xl font-extrabold text-slate-900 dark:text-white">Rejoignez la communauté</h1>
    <p class="mt-2 text-center text-sm text-slate-500 dark:text-slate-400">Créez votre compte gratuit en quelques secondes.</p>

    <div class="mt-8 w-full rounded-2xl border border-slate-200 bg-white p-6 shadow-card dark:border-slate-800 dark:bg-slate-900 sm:p-8">
        {{if .Error}}
        <div class="mb-5 flex items-center gap-2 rounded-xl border border-red-200 bg-red-50 px-4 py-3 text-sm font-medium text-red-700 dark:border-red-500/20 dark:bg-red-500/10 dark:text-red-300">
            <i data-lucide="alert-circle" class="h-4 w-4 shrink-0"></i> {{.Error}}
        </div>
        {{end}}
        <form action="/inscription" method="post" class="space-y-4">
            <div>
                <label class="mb-1.5 block text-sm font-semibold text-slate-700 dark:text-slate-300">Pseudo</label>
                <input type="text" name="username" required value="{{if .Username}}{{.Username}}{{end}}" placeholder="ex. carteo_42"
                    class="w-full rounded-xl border border-slate-200 bg-slate-50 px-4 py-2.5 text-sm outline-none transition focus:border-brand-400 focus:bg-white focus:ring-2 focus:ring-brand-100 dark:border-slate-700 dark:bg-slate-800 dark:text-slate-100 dark:focus:ring-brand-900">
            </div>
            <div>
                <label class="mb-1.5 block text-sm font-semibold text-slate-700 dark:text-slate-300">Adresse e-mail</label>
                <input type="email" name="email" required value="{{if .Email}}{{.Email}}{{end}}" placeholder="vous@exemple.fr"
                    class="w-full rounded-xl border border-slate-200 bg-slate-50 px-4 py-2.5 text-sm outline-none transition focus:border-brand-400 focus:bg-white focus:ring-2 focus:ring-brand-100 dark:border-slate-700 dark:bg-slate-800 dark:text-slate-100 dark:focus:ring-brand-900">
            </div>
            <div class="grid gap-4 sm:grid-cols-2">
                <div>
                    <label class="mb-1.5 block text-sm font-semibold text-slate-700 dark:text-slate-300">Mot de passe</label>
                    <input type="password" name="password" required minlength="6"
                        class="w-full rounded-xl border border-slate-200 bg-slate-50 px-4 py-2.5 text-sm outline-none transition focus:border-brand-400 focus:bg-white focus:ring-2 focus:ring-brand-100 dark:border-slate-700 dark:bg-slate-800 dark:text-slate-100 dark:focus:ring-brand-900">
                </div>
                <div>
                    <label class="mb-1.5 block text-sm font-semibold text-slate-700 dark:text-slate-300">Confirmation</label>
                    <input type="password" name="confirm" required minlength="6"
                        class="w-full rounded-xl border border-slate-200 bg-slate-50 px-4 py-2.5 text-sm outline-none transition focus:border-brand-400 focus:bg-white focus:ring-2 focus:ring-brand-100 dark:border-slate-700 dark:bg-slate-800 dark:text-slate-100 dark:focus:ring-brand-900">
                </div>
            </div>
            <button class="w-full rounded-xl bg-brand-600 py-3 text-sm font-bold text-white shadow-soft transition hover:bg-brand-700">Créer mon compte</button>
        </form>
    </div>

    <p class="mt-6 text-sm text-slate-500 dark:text-slate-400">
        Déjà inscrit ? <a href="/login" class="font-bold text-brand-600 hover:underline">Connectez-vous</a>
    </p>
</div>
{{end}}
