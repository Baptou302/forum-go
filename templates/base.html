{{define "base"}}<!DOCTYPE html>
<html lang="fr" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}} · Forum des 4 Couleurs</title>
    <meta name="description" content="La communauté française des passionnés de jeux de cartes traditionnelles.">

    <script>
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: {
                fontFamily: {
                    sans: ['"Plus Jakarta Sans"', 'ui-sans-serif', 'system-ui', 'sans-serif'],
                    display: ['"Playfair Display"', 'serif'],
                },
                colors: { brand: {
                    50:'#eef2ff',100:'#e0e7ff',200:'#c7d2fe',300:'#a5b4fc',400:'#818cf8',
                    500:'#6366f1',600:'#4f46e5',700:'#4338ca',800:'#3730a3',900:'#312e81',
                }},
                boxShadow: {
                    soft: '0 4px 24px -8px rgba(79,70,229,0.18)',
                    card: '0 1px 3px rgba(0,0,0,0.04), 0 8px 24px -12px rgba(0,0,0,0.12)',
                },
            }},
        }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>♠️</text></svg>">

    <script src="https://unpkg.com/lucide@latest"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>

<body class="min-h-screen bg-slate-50 text-slate-800 antialiased dark:bg-slate-950 dark:text-slate-200 selection:bg-brand-200 selection:text-brand-900">

{{template "header" .}}
{{template "flashbar" .}}

<main class="mx-auto max-w-6xl px-4 py-8 sm:px-6 sm:py-10">
    {{template "content" .}}
</main>

{{template "footer" .}}

<script>
    lucide.createIcons();
    document.addEventListener('alpine:initialized', () => lucide.createIcons());
</script>
</body>
</html>{{end}}
