{{define "thread_row"}}
<a href="/sujet/{{.ID}}" class="group flex items-start gap-4 px-5 py-4 transition hover:bg-slate-50 dark:hover:bg-slate-800/40">
    {{template "avatar" dict "User" .Author "Class" "h-11 w-11 text-base"}}
    <div class="min-w-0 flex-1">
        <div class="flex items-center gap-1.5">
            {{if .Pinned}}<i data-lucide="pin" class="h-3.5 w-3.5 shrink-0 text-amber-500" title="Épinglé"></i>{{end}}
            {{if .Locked}}<i data-lucide="lock" class="h-3.5 w-3.5 shrink-0 text-slate-400" title="Verrouillé"></i>{{end}}
            <h3 class="truncate font-semibold text-slate-900 transition group-hover:text-brand-600 dark:text-white dark:group-hover:text-brand-400">{{.Title}}</h3>
        </div>
        <p class="mt-0.5 line-clamp-1 text-sm text-slate-500 dark:text-slate-400">{{excerpt .Content 110}}</p>
        <div class="mt-2 flex flex-wrap items-center gap-x-3 gap-y-1 text-xs text-slate-400">
            <span class="font-semibold text-slate-600 dark:text-slate-300">{{.Author.Username}}</span>
            <span class="hidden h-1 w-1 rounded-full bg-slate-300 sm:block dark:bg-slate-600"></span>
            <span class="inline-flex items-center gap-1 rounded-full bg-slate-100 px-2 py-0.5 font-medium dark:bg-slate-800" style="color:{{.CategoryColor}}">
                <i data-lucide="{{.CategoryIcon}}" class="h-3 w-3"></i>{{.CategoryName}}
            </span>
            <span class="hidden h-1 w-1 rounded-full bg-slate-300 sm:block dark:bg-slate-600"></span>
            <span>{{timeAgo .LastActivity}}</span>
        </div>
    </div>
    <div class="hidden shrink-0 flex-col items-end gap-1.5 pt-1 text-xs font-medium text-slate-400 sm:flex">
        <span class="inline-flex items-center gap-1"><i data-lucide="message-circle" class="h-3.5 w-3.5"></i>{{.ReplyCount}}</span>
        <span class="inline-flex items-center gap-1"><i data-lucide="heart" class="h-3.5 w-3.5"></i>{{.LikeCount}}</span>
        <span class="inline-flex items-center gap-1"><i data-lucide="eye" class="h-3.5 w-3.5"></i>{{.Views}}</span>
    </div>
</a>
{{end}}
