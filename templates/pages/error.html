{{define "content"}}
<div class="flex flex-col items-center py-20 text-center">
    <div class="flex gap-2 text-5xl">
        <span class="text-slate-700 dark:text-slate-400">♠</span>
        <span class="text-red-500">♥</span>
        <span class="text-red-500">♦</span>
        <span class="text-slate-700 dark:text-slate-400">♣</span>
    </div>
    <h1 class="mt-6 font-display text-7xl font-extrabold text-slate-900 dark:text-white">{{.Code}}</h1>
    <p class="mt-3 text-lg font-semibold text-slate-600 dark:text-slate-300">{{.Message}}</p>
    <a href="/" class="mt-8 inline-flex items-center gap-2 rounded-xl bg-brand-600 px-5 py-3 text-sm font-bold text-white shadow-soft transition hover:bg-brand-700">
        <i data-lucide="home" class="h-4 w-4"></i> Retour à l'accueil
    </a>
</div>
{{end}}
