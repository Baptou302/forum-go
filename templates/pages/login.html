{{define "content"}}
<div class="mx-auto flex max-w-md flex-col items-center py-6">
    <a href="/" class="mb-6 grid h-14 w-14 place-items-center rounded-2xl bg-gradient-to-br from-brand-500 to-violet-600 text-2xl text-white shadow-soft">♠</a>
    <h1 class="font-display text-3xl font-extrabold text-slate-900 dark:text-white">Content de vous revoir</h1>
    <p class="mt-2 text-sm text-slate-500 dark:text-slate-400">Connectez-vous pour rejoindre la discussion.</p>

    <div class="mt-8 w-full rounded-2xl border border-slate-200 bg-white p-6 shadow-card dark:border-slate-800 dark:bg-slate-900 sm:p-8">
        {{if .Error}}
        <div class="mb-5 flex items-center gap-2 rounded-xl border border-red-200 bg-red-50 px-4 py-3 text-sm font-medium text-red-700 dark:border-red-500/20 dark:bg-red-500/10 dark:text-red-300">
            <i data-lucide="alert-circle" class="h-4 w-4 shrink-0"></i> {{.Error}}
        </div>
        {{end}}
        <form action="/login" method="post" class="space-y-4">
            <input type="hidden" name="next" value="{{.Next}}">
            <div>
                <label class="mb-1.5 block text-sm font-semibold text-slate-700 dark:text-slate-300">Pseudo ou e-mail</label>
                <input type="text" name="identifier" required autofocus value="{{if .Identifier}}{{.Identifier}}{{end}}"
                    class="w-full rounded-xl border border-slate-200 bg-slate-50 px-4 py-2.5 text-sm outline-none transition focus:border-brand-400 focus:bg-white focus:ring-2 focus:ring-brand-100 dark:border-slate-700 dark:bg-slate-800 dark:text-slate-100 dark:focus:ring-brand-900">
            </div>
            <div>
                <label class="mb-1.5 block text-sm font-semibold text-slate-700 dark:text-slate-300">Mot de passe</label>
                <input type="password" name="password" required
                    class="w-full rounded-xl border border-slate-200 bg-slate-50 px-4 py-2.5 text-sm outline-none transition focus:border-brand-400 focus:bg-white focus:ring-2 focus:ring-brand-100 dark:border-slate-700 dark:bg-slate-800 dark:text-slate-100 dark:focus:ring-brand-900">
            </div>
            <button class="w-full rounded-xl bg-brand-600 py-3 text-sm font-bold text-white shadow-soft transition hover:bg-brand-700">Se connecter</button>
        </form>
    </div>

    <p class="mt-6 text-sm text-slate-500 dark:text-slate-400">
        Pas encore de compte ? <a href="/inscription" class="font-bold text-brand-600 hover:underline">Inscrivez-vous</a>
    </p>

    <div class="mt-6 w-full rounded-xl border border-dashed border-slate-300 bg-slate-50 px-4 py-3 text-center text-xs text-slate-400 dark:border-slate-700 dark:bg-slate-900">
        <span class="font-semibold text-slate-500 dark:text-slate-300">Compte de démo :</span> herve / admin1234 (admin) · marc / forum1234 (membre)
    </div>
</div>
{{end}}
