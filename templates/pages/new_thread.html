{{define "content"}}
<div class="mx-auto max-w-2xl">
    <div class="mb-6">
        <h1 class="font-display text-3xl font-extrabold text-slate-900 dark:text-white">Nouveau sujet</h1>
        <p class="mt-1 text-slate-500 dark:text-slate-400">Lancez une discussion avec la communauté.</p>
    </div>

    <div class="rounded-2xl border border-slate-200 bg-white p-6 shadow-card dark:border-slate-800 dark:bg-slate-900 sm:p-8">
        {{if .Error}}
        <div class="mb-5 flex items-center gap-2 rounded-xl border border-red-200 bg-red-50 px-4 py-3 text-sm font-medium text-red-700 dark:border-red-500/20 dark:bg-red-500/10 dark:text-red-300">
            <i data-lucide="alert-circle" class="h-4 w-4 shrink-0"></i> {{.Error}}
        </div>
        {{end}}
        <form action="/nouveau-sujet" method="post" class="space-y-5">
            <div>
                <label class="mb-1.5 block text-sm font-semibold text-slate-700 dark:text-slate-300">Catégorie</label>
                <div class="relative">
                    <select name="category_id" required
                        class="w-full appearance-none rounded-xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm outline-none transition focus:border-brand-400 focus:bg-white focus:ring-2 focus:ring-brand-100 dark:border-slate-700 dark:bg-slate-800 dark:text-slate-100">
                        <option value="" disabled {{if not .Selected}}selected{{end}}>Choisissez une catégorie…</option>
                        {{range .Categories}}
                        <option value="{{.ID}}" {{if eq .Slug $.Selected}}selected{{end}}>{{.Name}}</option>
                        {{end}}
                    </select>
                    <i data-lucide="chevron-down" class="pointer-events-none absolute right-3 top-1/2 h-5 w-5 -translate-y-1/2 text-slate-400"></i>
                </div>
            </div>
            <div>
                <label class="mb-1.5 block text-sm font-semibold text-slate-700 dark:text-slate-300">Titre</label>
                <input type="text" name="title" required maxlength="120" value="{{if .FormTitle}}{{.FormTitle}}{{end}}" placeholder="Un titre clair et accrocheur"
                    class="w-full rounded-xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm outline-none transition focus:border-brand-400 focus:bg-white focus:ring-2 focus:ring-brand-100 dark:border-slate-700 dark:bg-slate-800 dark:text-slate-100">
            </div>
            <div>
                <label class="mb-1.5 block text-sm font-semibold text-slate-700 dark:text-slate-300">Message</label>
                <textarea name="content" rows="8" required placeholder="Développez votre idée, votre question ou votre annonce…"
                    class="w-full resize-y rounded-xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm leading-relaxed outline-none transition focus:border-brand-400 focus:bg-white focus:ring-2 focus:ring-brand-100 dark:border-slate-700 dark:bg-slate-800 dark:text-slate-100">{{if .FormContent}}{{.FormContent}}{{end}}</textarea>
            </div>
            <div class="flex items-center justify-end gap-3 border-t border-slate-100 pt-5 dark:border-slate-800">
                <a href="/" class="rounded-xl px-4 py-2.5 text-sm font-semibold text-slate-500 hover:text-slate-700 dark:hover:text-slate-300">Annuler</a>
                <button class="inline-flex items-center gap-2 rounded-xl bg-brand-600 px-5 py-2.5 text-sm font-bold text-white shadow-soft transition hover:bg-brand-700"><i data-lucide="send" class="h-4 w-4"></i> Publier le sujet</button>
            </div>
        </form>
    </div>
</div>
{{end}}
