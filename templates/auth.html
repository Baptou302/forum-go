{{define "auth.html"}}
{{template "header" .}}

<div class="auth-wrap">
    <div class="card auth-card">
        <div class="auth-tabs">
            <a href="/login" class="auth-tab{{if eq .Tab "login"}} active{{end}}">Connexion</a>
            <a href="/register" class="auth-tab{{if eq .Tab "register"}} active{{end}}">Inscription</a>
        </div>

        {{if .Error}}<div class="alert">{{.Error}}</div>{{end}}

        {{if eq .Tab "login"}}
        <form action="/login" method="post" class="auth-form">
            <div class="form-group">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="input" required autofocus>
            </div>
            <div class="form-group">
                <label class="form-label">Mot de passe</label>
                <input type="password" name="password" class="input" required>
            </div>
            <button type="submit" class="btn btn-accent btn-full">Se connecter</button>
            <p class="auth-switch">Pas encore de compte ? <a href="/register" class="link">S'inscrire</a></p>
        </form>
        {{else}}
        <form action="/register" method="post" class="auth-form">
            <div class="form-group">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="input" required autofocus>
            </div>
            <div class="form-group">
                <label class="form-label">Nom d'utilisateur</label>
                <input type="text" name="username" class="input" required>
            </div>
            <div class="form-group">
                <label class="form-label">Mot de passe</label>
                <input type="password" name="password" class="input" required>
            </div>
            <button type="submit" class="btn btn-accent btn-full">Créer un compte</button>
            <p class="auth-switch">Déjà membre ? <a href="/login" class="link">Se connecter</a></p>
        </form>
        {{end}}
    </div>
</div>

{{template "footer" .}}
{{end}}
