{{define "header"}}
{{ $u := .User }}
<header class="sticky top-0 z-40 border-b border-slate-200/70 bg-white/80 backdrop-blur-lg dark:border-slate-800 dark:bg-slate-900/80">
    <div class="mx-auto flex h-16 max-w-6xl items-center gap-4 px-4 sm:px-6">

        <a href="/" class="flex shrink-0 items-center gap-2.5">
            <span class="grid h-10 w-10 place-items-center rounded-xl bg-gradient-to-br from-brand-500 to-violet-600 text-lg shadow-soft">
                <span class="-mt-0.5 tracking-tighter text-white">♠</span>
            </span>
            <span class="hidden flex-col leading-none sm:flex">
                <span class="font-display text-lg font-extrabold text-slate-900 dark:text-white">4&nbsp;Couleurs</span>
                <span class="text-[11px] font-medium uppercase tracking-widest text-brand-500">Le Forum</span>
            </span>
        </a>

        <form action="/recherche" method="get" class="relative ml-2 hidden flex-1 md:block">
            <i data-lucide="search" class="pointer-events-none absolute left-3 top-1/2 h-4 w-4 -translate-y-1/2 text-slate-400"></i>
            <input type="search" name="q" placeholder="Rechercher un sujet…" value="{{if .Query}}{{.Query}}{{end}}"
                   class="w-full rounded-full border border-slate-200 bg-slate-100/70 py-2 pl-10 pr-4 text-sm outline-none transition focus:border-brand-400 focus:bg-white focus:ring-2 focus:ring-brand-100 dark:border-slate-700 dark:bg-slate-800 dark:text-slate-100 dark:focus:ring-brand-900">
        </form>

        <nav class="ml-auto flex items-center gap-1">
            <a href="/" class="hidden rounded-lg px-3 py-2 text-sm font-semibold text-slate-600 transition hover:bg-slate-100 hover:text-brand-600 dark:text-slate-300 dark:hover:bg-slate-800 lg:block {{if eq .Active "accueil"}}!text-brand-600 dark:!text-brand-400{{end}}">Accueil</a>

            <button @click="document.documentElement.classList.toggle('dark'); localStorage.theme = document.documentElement.classList.contains('dark') ? 'dark' : 'light'"
                    class="grid h-9 w-9 place-items-center rounded-lg text-slate-500 transition hover:bg-slate-100 dark:text-slate-400 dark:hover:bg-slate-800" title="Changer de thème">
                <i data-lucide="sun" class="h-5 w-5 hidden dark:block"></i>
                <i data-lucide="moon" class="h-5 w-5 dark:hidden"></i>
            </button>

            {{if $u}}
                <a href="/nouveau-sujet" class="ml-1 hidden items-center gap-1.5 rounded-lg bg-brand-600 px-3.5 py-2 text-sm font-semibold text-white shadow-soft transition hover:bg-brand-700 sm:inline-flex">
                    <i data-lucide="plus" class="h-4 w-4"></i> Nouveau sujet
                </a>
                {{template "usermenu" $u}}
            {{else}}
                <a href="/login" class="ml-1 rounded-lg px-3.5 py-2 text-sm font-semibold text-slate-600 transition hover:bg-slate-100 dark:text-slate-300 dark:hover:bg-slate-800">Connexion</a>
                <a href="/inscription" class="rounded-lg bg-brand-600 px-3.5 py-2 text-sm font-semibold text-white shadow-soft transition hover:bg-brand-700">Inscription</a>
            {{end}}
        </nav>
    </div>
</header>
{{end}}
