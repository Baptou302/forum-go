{{define "flashbar"}}
{{if .Flash}}
<div x-data="{ show:true }" x-show="show" x-init="setTimeout(()=>show=false, 5000)" x-transition
     class="mx-auto mt-4 max-w-6xl px-4 sm:px-6">
    <div class="flex items-center gap-3 rounded-xl border px-4 py-3 text-sm font-medium shadow-sm
        {{if eq .Flash.Type "success"}}border-emerald-200 bg-emerald-50 text-emerald-800 dark:border-emerald-500/20 dark:bg-emerald-500/10 dark:text-emerald-300
        {{else}}border-red-200 bg-red-50 text-red-800 dark:border-red-500/20 dark:bg-red-500/10 dark:text-red-300{{end}}">
        <i data-lucide="{{if eq .Flash.Type "success"}}check-circle-2{{else}}alert-circle{{end}}" class="h-5 w-5 shrink-0"></i>
        <span>{{.Flash.Message}}</span>
        <button @click="show=false" class="ml-auto opacity-60 hover:opacity-100"><i data-lucide="x" class="h-4 w-4"></i></button>
    </div>
</div>
{{end}}
{{end}}
